<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Maju Group - Job Progress</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; background-color: #f4f4f4; background-image: url('background.jpg'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: -1; }
        .container { max-width: 900px; width: 100%; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; position: relative; }
        .admin-trigger { position: absolute; top: 15px; right: 20px; font-size: 11px; color: #888; background: #eee; padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 1px solid #ddd; }
        .logo { max-width: 120px; margin-bottom: 10px; }
        .company-name { font-size: 28px; font-weight: 900; color: #cc0000; letter-spacing: 1px; }
        .app-title { font-size: 14px; font-weight: 600; color: #000; margin-bottom: 25px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #cc0000; color: white; border: none; cursor: pointer; font-weight: bold; }
        .instruction { font-size: 14px; color: #444; text-align: left; background: #fff8f8; padding: 10px; border-radius: 8px; border: 1px dashed #cc0000; margin-bottom: 15px; }
        .status-box { background: #fff; padding: 20px; margin-top: 20px; border-left: 8px solid #cc0000; border-radius: 12px; text-align: left; display: none; }
        .last-update-tag { font-size: 11px; color: #777; font-style: italic; display: block; margin-top: 10px; text-align: right; }
        #admin-panel, #staff-section, #logout-btn { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; font-size: 12px; }
        .update-info { font-size: 10px; color: #666; }
        .back-link { display: block; text-align: left; font-size: 12px; color: #cc0000; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="staff-tab-small" class="admin-trigger" onclick="showSection('staff')">STAFF LOGIN</div>

    <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
    <div class="company-name">ARIF MAJU GROUP</div>
    <div class="app-title">Job Progress Tracker</div>

    <div id="customer-section">
        <h3>Semak Status Kerja</h3>
        <p class="instruction">Sila masukkan <strong>nombor telefon yang anda gunakan semasa membuat tempahan</strong> tanpa senggang (-) atau jarak (space).</p>
        <input type="text" id="searchPhone" placeholder="Contoh: 0123456789">
        <button onclick="checkProgress()">SEMAK SEKARANG</button>
        <div id="result" class="status-box">
            <p><strong>Nama Kerja:</strong> <br><span id="displayJob"></span></p>
            <p><strong>Status Terkini:</strong> <br><span id="displayStatus" style="color: #cc0000; font-weight: bold; font-size: 1.1em;"></span></p>
            <p><strong>Jangkaan Siap:</strong> <br><span id="displayDate"></span></p>
            <span class="last-update-tag" id="displayLastUpdate"></span>
        </div>
    </div>

    <div id="staff-section">
        <div class="back-link" onclick="showSection('customer')">← Kembali</div>
        <div id="login-form">
            <h3>Staff Login</h3>
            <input type="email" id="loginEmail" placeholder="Email Staf">
            <input type="password" id="loginPass" placeholder="Kata Laluan">
            <button onclick="login()">LOG MASUK</button>
        </div>
        <div id="admin-panel">
            <button onclick="logout()" style="background: #666; width: auto; float: right; padding: 5px 10px; font-size: 11px;">Logout</button>
            <div style="clear: both;"></div>
            <h3>Kemasukan Data</h3>
            <input type="text" id="custPhone" placeholder="No. Tel Pelanggan">
            <input type="text" id="jobName" placeholder="Nama Projek">
            <input type="date" id="dueDate">
            <select id="jobStatus">
                <option value="Dalam Giliran">Dalam Giliran</option>
                <option value="Proses Design">Proses Design</option>
                <option value="Proses Cetak">Proses Cetak</option>
                <option value="Pemasangan">Pemasangan</option>
                <option value="Sedia Diambil">Sedia Diambil</option>
            </select>
            <button onclick="updateJob()" style="background: #28a745;">SIMPAN DATA</button>
            <table id="jobTable">
                <thead><tr><th>No. Tel</th><th>Projek</th><th>Status</th><th>Admin</th><th>Aksi</th></tr></thead>
                <tbody id="jobTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // MENGGUNAKAN CONFIG BARU ANDA
    const firebaseConfig = {
        apiKey: "AIzaSyAQy5m_5eCQn933gsbugq8Fg0AiRTu3CKo",
        authDomain: "track-job-progress.firebaseapp.com",
        projectId: "track-job-progress",
        storageBucket: "track-job-progress.firebasestorage.app",
        messagingSenderId: "463137015561",
        appId: "1:463137015561:web:256c816e2485de45a0f5d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        const adminPanel = document.getElementById('admin-panel');
        const loginForm = document.getElementById('login-form');
        if (user) {
            loginForm.style.display = 'none';
            adminPanel.style.display = 'block';
            listenToJobs();
        } else {
            loginForm.style.display = 'block';
            adminPanel.style.display = 'none';
        }
    });

    window.login = async function() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            alert("Ralat: " + e.message);
        }
    };

    window.logout = () => signOut(auth);

    function listenToJobs() {
        onSnapshot(collection(db, "jobs"), (snap) => {
            const tbody = document.getElementById('jobTableBody');
            tbody.innerHTML = "";
            snap.forEach((d) => {
                const data = d.data();
                tbody.innerHTML += `<tr>
                    <td>${d.id}</td>
                    <td>${data.nama_kerja}</td>
                    <td>${data.status_kerja}</td>
                    <td class="update-info">${data.updatedBy ? data.updatedBy.split('@')[0] : '-'}</td>
                    <td><button onclick="deleteJob('${d.id}')" style="background:red; padding:2px 5px; font-size:10px;">X</button></td>
                </tr>`;
            });
        });
    }

    window.updateJob = async function() {
        const phone = document.getElementById('custPhone').value;
        const job = document.getElementById('jobName').value;
        const status = document.getElementById('jobStatus').value;
        const date = document.getElementById('dueDate').value;
        if(!phone || !job) return alert("Isi No. Tel dan Projek.");
        try {
            await setDoc(doc(db, "jobs", phone), {
                nama_kerja: job, status_kerja: status, tarikh_siap: date,
                updatedBy: auth.currentUser.email, updatedAt: Date.now()
            });
            alert("Berjaya!");
        } catch (e) { alert(e.message); }
    };

    window.deleteJob = async (id) => { if(confirm("Padam?")) await deleteDoc(doc(db, "jobs", id)); };

    window.checkProgress = async function() {
        const phone = document.getElementById('searchPhone').value;
        const d = await getDoc(doc(db, "jobs", phone));
        if (d.exists()) {
            const data = d.data();
            document.getElementById('result').style.display = 'block';
            document.getElementById('displayJob').innerText = data.nama_kerja;
            document.getElementById('displayStatus').innerText = data.status_kerja;
            document.getElementById('displayDate').innerText = data.tarikh_siap || "Akan dimaklumkan";
            document.getElementById('displayLastUpdate').innerText = "Dikemaskini: " + new Date(data.updatedAt).toLocaleString('ms-MY');
        } else alert("No. tidak ditemui.");
    };

    window.showSection = (s) => {
        document.getElementById('customer-section').style.display = s === 'customer' ? 'block' : 'none';
        document.getElementById('staff-section').style.display = s === 'staff' ? 'block' : 'none';
    };
</script>
</body>
</html>
